<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{

  .wrap{max-width:1180px;margin:0 auto}

  .nav{position:sticky;top:0;z-index:30;margin:0 0 16px;
    background:rgba(244,246,243,.92);backdrop-filter:blur(8px);

  .nav-bar{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .nav-now{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.04em}
  .nav-now .nn-r{color:var(--accent);font-weight:600;font-size:11px;margin-left:6px}
  .nav-toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    color:var(--ink2);font-family:inherit;font-size:11.5px;padding:5px 11px;transition:.12s}
  .nav-toggle:hover{border-color:var(--accent);color:var(--accent)}
  .nt-caret{font-size:10px;transition:transform .18s}
  .nav.collapsed .nt-caret{transform:rotate(-90deg)}
  .nav-body{margin-top:9px;overflow:hidden;max-height:400px;transition:max-height .22s ease,margin-top .22s ease,opacity .18s}
  .nav.collapsed .nav-body{max-height:0;margin-top:0;opacity:0;pointer-events:none}
  .nav.collapsed .nav-now{color:var(--accent)}
  .venue-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
  .venue-tabs button{font-family:inherit;cursor:pointer;font-size:13px;letter-spacing:.06em;
    background:var(--panel);color:var(--ink2);border:1px solid var(--line);border-radius:9px;padding:7px 16px;font-weight:600;transition:.12s}
  .venue-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .race-jump{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .race-jump .jl{font-size:10px;color:var(--ink3);letter-spacing:.1em;margin-right:4px}
  .race-jump button{font-family:inherit;cursor:pointer;font-size:12px;min-width:34px;
    background:var(--panel);color:var(--ink2);border:1px solid var(--line);border-radius:7px;padding:5px 0;transition:.12s;position:relative}
  .race-jump button:hover{border-color:var(--accent);color:var(--accent)}
  .race-jump button.arashi-dot::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--shobu)}
  .race-jump button.allbtn{min-width:auto;padding:5px 12px}

  .toolbar{display:flex;gap:18px;align-items:center;flex-wrap:wrap;
    border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:11px 16px;margin-bottom:18px}
  .tgroup{display:flex;align-items:center;gap:8px}
  .tgroup .tl{font-size:10.5px;color:var(--ink3);letter-spacing:.12em;line-height:1.35}
  .seg-ctrl{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg-ctrl button{background:var(--panel);color:var(--ink2);border:none;cursor:pointer;font-size:11.5px;padding:6px 12px;font-family:inherit;letter-spacing:.04em;transition:background .12s,color .12s}
  .seg-ctrl button+button{border-left:1px solid var(--line)}
  .seg-ctrl button.on{background:var(--accent);color:#fff;font-weight:700}
  .toolbar .spacer{flex:1}
  .toolbar .clear{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink3);font-size:11px;padding:6px 12px;cursor:pointer;font-family:inherit;transition:.12s}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .grid.digest{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .race{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden;display:flex;flex-direction:column;scroll-margin-top:140px;box-shadow:0 1px 3px rgba(20,40,30,.04)}
  .race.arashi{border-color:#f0b9aa;box-shadow:0 0 0 1px #f6cabd inset,0 6px 22px -14px var(--shobu)}
  .rhead{display:flex;align-items:center;gap:12px;padding:13px 15px 12px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .rwho{flex:1;min-width:0}
  .rwho .v{font-size:15px;font-weight:700;letter-spacing:.06em}
  .rwho .v .r{color:var(--accent);margin-left:2px}
  .rwho .meta{font-size:10.5px;color:var(--ink3);margin-top:2px;letter-spacing:.05em}
  .rwho .rname{font-size:12.5px;color:var(--ink2);font-weight:600;margin-top:2px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stage{flex-shrink:0;width:64px;height:64px;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .stage.sm{width:50px;height:50px;border-radius:11px}
  .stage .num{font-size:30px;line-height:1;font-family:"Yu Gothic",sans-serif;letter-spacing:-.02em}
  .stage.sm .num{font-size:23px}
  .stage .cap{font-size:8.5px;letter-spacing:.18em;margin-top:3px;opacity:.92;font-weight:700}
  .stage.sm .cap{font-size:7.5px;margin-top:2px}
  .gauge{display:flex;gap:2px;padding:10px 15px 4px}
  .gauge .s{flex:1;height:6px;border-radius:2px;background:#e6ebe5}
  .label-row{display:flex;justify-content:space-between;gap:8px;padding:0 15px 9px;font-size:10px;color:var(--ink3);letter-spacing:.06em;flex-wrap:wrap}
  .label-row .cifout{color:var(--ink2)}
  .race-sort{display:flex;gap:4px;padding:0 15px 9px}
  .race-sort button{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:7px;color:var(--ink3);font-size:10px;padding:4px 0;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:.12s}

  .shobu-row .who{color:var(--ink);font-weight:600}
  .shobu-row .who small{color:var(--ink2);font-weight:400;margin-left:5px}

  .uno-badge{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:24px;padding:0 5px;border-radius:6px;
    background:#eef2ed;border:1px solid var(--line);color:var(--ink);
    font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .waku{display:inline-flex;width:22px;height:22px;border-radius:5px;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid transparent}
  .sho-dot{color:var(--shobu);font-weight:800;margin-left:4px}
  .led{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:700;min-width:24px;text-align:right}
  select.mark-sel{
    appearance:none;-webkit-appearance:none;flex-shrink:0;
    width:44px;height:30px;border-radius:7px;border:1px solid var(--line);background:#fff;
    color:var(--ink3);font-size:15px;cursor:pointer;font-family:"Yu Gothic",serif;font-weight:700;
    text-align:center;text-align-last:center;padding:0;transition:.1s}
  select.mark-sel:hover{border-color:var(--ink3)}
  select.mark-sel.set{border-color:var(--accent);color:var(--accent);background:rgba(15,138,95,.06)}
  select.mark-sel.keshi{border-color:#c98a78;color:#b0492f;background:rgba(176,73,47,.06)}
  select.mark-sel option{background:#fff;color:var(--ink);font-size:14px}

  .hlist{padding:2px 0 6px}
  .hcard{display:grid;
    grid-template-columns:1fr auto auto;
    grid-template-areas:"id pop cif" "id od sc" "sub sub sub";
    align-items:center;column-gap:12px;row-gap:3px;
    padding:8px 15px;border-bottom:1px solid #eef2ec}
  .hcard:last-child{border-bottom:none}
  .hcard.sho{background:rgba(224,83,46,.06)}
  .hcard.marked{background:rgba(15,138,95,.05)}
  .hcard.marked.sho{background:rgba(224,83,46,.09)}
  .hcard .idblk{grid-area:id;display:flex;align-items:center;gap:7px;min-width:0}
  .hcard .nm{flex:1;min-width:0;font-size:13.5px;color:var(--ink);font-weight:600;

  .hcard .subln{grid-area:sub;font-size:10.5px;color:var(--ink3);padding-left:79px;margin-top:-1px;display:flex;gap:10px;flex-wrap:wrap}

  .hcard .pop{grid-area:pop;text-align:right;font-size:11px;color:var(--ink3);font-variant-numeric:tabular-nums;white-space:nowrap}
  .hcard .od {grid-area:od; text-align:right;font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums;white-space:nowrap}
  .hcard .cif{grid-area:cif;text-align:right;justify-self:end}
  .hcard .sc {grid-area:sc; justify-self:end;display:flex;align-items:center;gap:7px}
  .hcard.keshi .nm{color:var(--ink3);text-decoration:line-through;text-decoration-color:var(--ink3);opacity:.7}
  .hcard.keshi .uno-badge{opacity:.5}
  .hcard.keshi .waku{filter:grayscale(1) brightness(.95)}
  .hcard.keshi .led,.hcard.keshi .od,.hcard.keshi .pop,.hcard.keshi .subln{color:var(--ink3)}
  .colhead{display:grid;grid-template-columns:1fr auto auto;column-gap:12px;
    padding:6px 15px 6px;border-bottom:1px solid var(--line);

  .colhead .ch-pop{text-align:right}
  .colhead .ch-cif{text-align:right;justify-self:end}

  .digest-list .dh .dmk.keshi{color:#b0492f}
  .digest-list .dh .duno{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;padding:0 4px;border-radius:5px;background:#eef2ed;border:1px solid var(--line);font-size:12px;font-weight:800;font-variant-numeric:tabular-nums}
  .digest-list .dh .dpop{color:var(--ink3);font-size:10.5px;flex-shrink:0}
  .digest-list .dh.keshi .dnm{color:var(--ink3);text-decoration:line-through;opacity:.6}
  footer{margin-top:26px;padding:16px 6px 0;border-top:1px solid var(--line);font-size:11px;color:var(--ink3);line-height:1.8;letter-spacing:.04em}
  footer b{color:var(--ink2)}
  @media (max-width:560px){
    .grid{grid-template-columns:1fr}
    .brand{font-size:22px}
    .toolbar{gap:12px}
    .race{scroll-margin-top:184px}
    body{padding:18px 10px 70px}
    .mast .desc{padding:6px 16px 14px}
    .legend{padding:0 16px 16px}
  }
</style>
</head>

function gradeColor(st){return getComputedStyle(document.documentElement).getPropertyValue(GC[st]).trim();}
function wakuStyle(g){if(g<1||g>8)return'background:#e3ebe5;color:#566159;border-color:#dde3dc';return`background:var(--w${g});color:var(--w${g}t);border-color:var(--w${g}b)`;}
function obandLabel(ob){const t=['1.0–1.5','1.5–2.0','2.0–2.5','2.5–3.0','3.0–4.0','4.0+'];return'帯'+ob+' (想定1番人気 約'+t[ob]+'倍)';}

function loadStore(k,def){try{const v=localStorage.getItem(BOARD_ID+':'+k);return v==null?def:JSON.parse(v);}catch(e){return def;}}
function saveStore(k,v){try{localStorage.setItem(BOARD_ID+':'+k,JSON.stringify(v));}catch(e){}}

const VENUES=[...new Set(RACES.map(r=>r.venue))];
RACES.forEach((r,i)=>{r._key='r'+i; r._id='race-'+r.venue+'-'+r.no;});

let VIEW=loadStore('view','full');
let SORT=loadStore('sort','num');
let VENUE=loadStore('venue',VENUES[0]);
if(!VENUES.includes(VENUE)) VENUE=VENUES[0];
const raceSort=loadStore('raceSort',{});
const marks=loadStore('marks',{});
let NAVCOLLAPSED=loadStore('navCollapsed',false);

function markStr(ri,num){return marks[ri+':'+num]||'';}
function setMark(ri,num,val){const key=ri+':'+num; if(!val)delete marks[key];else marks[key]=val; saveStore('marks',marks); render();}

function sortRows(rows,key){
  const a=rows.slice();
  if(key==='num') a.sort((x,y)=>x.num-y.num);
  else if(key==='pop') a.sort((x,y)=>(x.pop==null?99:x.pop)-(y.pop==null?99:y.pop)||x.num-y.num);
  else if(key==='cif') a.sort((x,y)=>(y.score||0)-(x.score||0)||x.num-y.num);
  else if(key==='mark') a.sort((x,y)=>(MARK_ORDER[markStr(x._ri,x.num)]||99)-(MARK_ORDER[markStr(y._ri,y.num)]||99)||x.num-y.num);
  return a;
}

function markSelect(ri,num){
  const cur=markStr(ri,num), isK=(cur===KESHI), set=cur!=='';
  const opts=MARKS.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m===''?'―':m}</option>`).join('');
  return `<select class="mark-sel ${set?'set':''} ${isK?'keshi':''}" onchange="setMark(${ri},${num},this.value)">${opts}</select>`;
}

function horseRow(h,race,ri){
  const isSho=race.shobu===h.num;
  const ms=markStr(ri,h.num), marked=ms!=='', isKeshi=(ms===KESHI);
  let rkCell=h.rank===1?`<span class="rk rk1">CIF1</span>`:(h.rank!=null?`<span class="rk rk-o">CIF${h.rank}</span>`:'<span style="color:var(--ink3)">―</span>');
  const sc=h.score||0;
  const odds=h.odds!=null?'約'+h.odds.toFixed(1)+'倍':'―', pop=h.pop!=null?'想定'+h.pop+'番人気':'―';
  const jk = h.kisyu? `<span class="jk">${h.kisyu}</span>` : '';
  const kn = (h.kin!=null)? `${h.kin.toFixed(1)}kg` : '';
  const sub = (jk||kn)? `<span class="subln">${jk}${kn?`<span>${kn}</span>`:''}</span>` : '';
  return `<div class="hcard ${isSho?'sho':''} ${marked?'marked':''} ${isKeshi?'keshi':''}">
    <div class="idblk">
      ${markSelect(ri,h.num)}
      <span class="waku" style="${wakuStyle(h.g)}">${h.g||''}</span>
      <span class="uno-badge">${h.num}</span>
      <span class="nm">${h.name||''}${isSho?'<span class="sho-dot">◆</span>':''}</span>
    </div>
    <span class="pop">${pop}</span>
    <span class="cif">${rkCell}</span>
    <span class="od">${odds}</span>
    <span class="sc"><span class="led">${sc.toFixed(0)}</span></span>
    ${sub}
  </div>`;
}

function digestList(r,ri){
  const top=r.rows.slice().sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,3);
  return `<div class="digest-list">`+top.map((h,i)=>{
    const isSho=r.shobu===h.num, ms=markStr(ri,h.num), isKeshi=(ms===KESHI);
    return `<div class="dh ${isKeshi?'keshi':''}">
      <span class="dmk ${isKeshi?'keshi':''}">${ms||''}</span>
      <span class="drk">CIF${i+1}</span>
      <span class="waku" style="${wakuStyle(h.g)}">${h.g||''}</span>
      <span class="duno">${h.num}</span>
      <span class="dnm">${h.name}${isSho?'<span class="sho-dot">◆</span>':''}</span>
      <span class="dpop">${h.pop!=null?'想定'+h.pop+'人':''}</span>
      <span class="led">${(h.score||0).toFixed(0)}</span>
    </div>`;
  }).join('')+`</div>`;
}

function raceCard(r,ri){
  const col=gradeColor(r.stage);
  const segs=Array.from({length:10},(_,i)=>`<div class="s" style="background:${i<r.stage?gradeColor(i+1):'#e6ebe5'}"></div>`).join('');
  const arashi=r.stage>=9?'arashi':'';
  const head=`<div class="rhead">
      <div class="rwho"><div class="v">${r.venue}<span class="r">${r.no}R</span></div>
      <div class="rname">${r.rname||''}</div>
      <div class="meta">${r.post||''}　${obandLabel(r.oband)}</div></div>
      <div class="stage ${VIEW==='digest'?'sm':''}" style="background:${col}"><div class="num">${r.stage}</div><div class="cap">波乱度</div></div>
    </div>`;
  if(VIEW==='digest'){
    return `<div class="race ${arashi}" id="${r._id}">${head}<div class="gauge">${segs}</div>
      <div class="label-row"><span>段 ${r.stage}/10 ・ ${GLABEL[r.stage]}</span>
      <span class="cifout">${r.shobu?'<span style="color:var(--shobu);font-weight:700">菖蒲湯あり</span>':''}</span></div>
      ${digestList(r,ri)}</div>`;
  }
  let shobuRow='';
  if(r.shobu){const h=r.rows.find(x=>x.num===r.shobu);
    shobuRow=`<div class="shobu-row"><span class="tag">菖蒲湯</span>
      <span class="who">${h.num} ${h.name}
      <small>想定${h.pop}番人気・約${h.odds.toFixed(1)}倍・CIF ${h.score.toFixed(0)}</small></span></div>`;}
  const key=raceSort[r._key]||SORT;
  const rows=sortRows(r.rows.map(h=>({...h,_ri:ri})),key);
  const sortBtn=(k,lbl)=>`<button class="${key===k?'on':''}" onclick="setRaceSort('${r._key}','${k}')">${lbl}</button>`;
  const colhead=`<div class="colhead"><span class="ch-id">印 / 枠 / 馬番 / 馬名</span><span class="ch-pop">想定人気 / オッズ</span><span class="ch-cif">CIF順 / 指数</span></div>`;
  return `<div class="race ${arashi}" id="${r._id}">${head}
    <div class="gauge">${segs}</div>
    <div class="label-row"><span>段 ${r.stage}/10 ・ ${GLABEL[r.stage]}</span>
      <span class="cifout">想定人気薄CIF1位 = #${r.cif1!=null?r.cif1:'―'} (${r.cifout.toFixed(0)})</span></div>
    ${shobuRow}
    <div class="race-sort">${sortBtn('num','馬番')}${sortBtn('mark','印')}${sortBtn('pop','人気')}${sortBtn('cif','CIF')}</div>
    ${colhead}
    <div class="hlist">${rows.map(h=>horseRow(h,r,ri)).join('')}</div>
  </div>`;
}

function setRaceSort(key,sort){raceSort[key]=sort;saveStore('raceSort',raceSort);render();}

function buildNav(){
  document.getElementById('venueTabs').innerHTML=VENUES.map(v=>
    `<button data-venue="${v}" class="${v===VENUE?'on':''}">${v}</button>`).join('');
  const list=RACES.filter(r=>r.venue===VENUE).sort((a,b)=>a.no-b.no);
  const btns=list.map(r=>{
    const dot=r.stage>=9?'arashi-dot':'';
    return `<button class="${dot}" data-jump="${r._id}">${r.no}</button>`;
  }).join('');
  document.getElementById('raceJump').innerHTML=
    `<span class="jl">レース</span><button class="allbtn" data-jump="__top">全</button>`+btns;
  document.getElementById('navNow').innerHTML=
    `${VENUE}<span class="nn-r">全${list.length}R</span>`;
  document.getElementById('nav').classList.toggle('collapsed', NAVCOLLAPSED);
}

function render(){
  const grid=document.getElementById('grid');
  grid.className='grid'+(VIEW==='digest'?' digest':'');
  const idx=RACES.map((r,i)=>i).filter(i=>RACES[i].venue===VENUE).sort((a,b)=>RACES[a].no-RACES[b].no);
  grid.innerHTML=idx.map(i=>raceCard(RACES[i],i)).join('');
  buildNav();
  [...document.querySelectorAll('#viewCtrl button')].forEach(b=>b.classList.toggle('on',b.dataset.view===VIEW));
  [...document.querySelectorAll('#sortCtrl button')].forEach(b=>b.classList.toggle('on',b.dataset.sort===SORT));
  const dim=VIEW==='digest';
  const sg=document.getElementById('sortGroupWrap');
  sg.style.opacity=dim?'.4':'1'; sg.style.pointerEvents=dim?'none':'auto';
}

document.getElementById('navToggle').addEventListener('click',()=>{
  NAVCOLLAPSED=!NAVCOLLAPSED; saveStore('navCollapsed',NAVCOLLAPSED);
  document.getElementById('nav').classList.toggle('collapsed',NAVCOLLAPSED);
});
document.getElementById('venueTabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; VENUE=b.dataset.venue; saveStore('venue',VENUE); render();
  window.scrollTo({top:0,behavior:'smooth'});
});
document.getElementById('raceJump').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  const t=b.dataset.jump;
  if(t==='__top'){window.scrollTo({top:0,behavior:'smooth'});return;}
  const el=document.getElementById(t); if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
});
document.getElementById('viewCtrl').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; VIEW=b.dataset.view; saveStore('view',VIEW); render();
});
document.getElementById('sortCtrl').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; SORT=b.dataset.sort; saveStore('sort',SORT);
  for(const k in raceSort) delete raceSort[k]; saveStore('raceSort',raceSort); render();
});
document.getElementById('clearMarks').addEventListener('click',()=>{
  if(!confirm('この開催の印をすべて消去します。よろしいですか？'))return;
  for(const k in marks) delete marks[k]; saveStore('marks',marks); render();
});

render();
</script>
</body>
</html>
