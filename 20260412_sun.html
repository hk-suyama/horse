const BOARD_ID='20260412_sun';
const GC=['','--g1','--g2','--g3','--g4','--g5','--g6','--g7','--g8','--g9','--g10'];
const GLABEL=['','静穏','静穏','平','平','やや','やや','警','警','荒','大荒'];
const MARKS=['','◎','○','▲','△','×','☆','注','消'];
const MARK_ORDER={'◎':1,'○':2,'▲':3,'△':4,'×':5,'☆':6,'注':7,'消':8,'':99};
const KESHI='消';
function gradeColor(st){return getComputedStyle(document.documentElement).getPropertyValue(GC[st]).trim();}
function wakuStyle(g){if(g<1||g>8)return'background:#1d2e26;color:#8aa399';return`background:var(--w${g});color:var(--w${g}t)`;}
function obandLabel(ob){const t=['1.0–1.5','1.5–2.0','2.0–2.5','2.5–3.0','3.0–4.0','4.0+'];return'帯'+ob+' (想定1番人気 約'+t[ob]+'倍)';}

function loadStore(k,def){try{const v=localStorage.getItem(BOARD_ID+':'+k);return v==null?def:JSON.parse(v);}catch(e){return def;}}
function saveStore(k,v){try{localStorage.setItem(BOARD_ID+':'+k,JSON.stringify(v));}catch(e){}}

// venues in stable order
const VENUES=[...new Set(RACES.map(r=>r.venue))];
RACES.forEach((r,i)=>{r._key='r'+i; r._id='race-'+r.venue+'-'+r.no;});

let VIEW=loadStore('view','full');
let SORT=loadStore('sort','num');
let VENUE=loadStore('venue',VENUES[0]);
if(!VENUES.includes(VENUE)) VENUE=VENUES[0];
const raceSort=loadStore('raceSort',{});
const marks=loadStore('marks',{});

function markStr(ri,num){return marks[ri+':'+num]||'';}
function setMark(ri,num,val){const key=ri+':'+num; if(!val)delete marks[key];else marks[key]=val; saveStore('marks',marks); render();}

function sortRows(rows,key){
  const a=rows.slice();
  if(key==='num') a.sort((x,y)=>x.num-y.num);
  else if(key==='pop') a.sort((x,y)=>(x.pop==null?99:x.pop)-(y.pop==null?99:y.pop)||x.num-y.num);
  else if(key==='cif') a.sort((x,y)=>(y.score||0)-(x.score||0)||x.num-y.num);
  else if(key==='mark') a.sort((x,y)=>(MARK_ORDER[markStr(x._ri,x.num)]||99)-(MARK_ORDER[markStr(y._ri,y.num)]||99)||x.num-y.num);
  return a;
}

function markSelect(ri,num){
  const cur=markStr(ri,num), isK=(cur===KESHI), set=cur!=='';
  const opts=MARKS.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m===''?'―':m}</option>`).join('');
  return `<select class="mark-sel ${set?'set':''} ${isK?'keshi':''}" onchange="setMark(${ri},${num},this.value)">${opts}</select>`;
}

function horseRow(h,race,ri){
  const isOut=(h.rank!=null), isSho=race.shobu===h.num;
  const ms=markStr(ri,h.num), marked=ms!=='', isKeshi=(ms===KESHI);
  let rkCell=h.rank===1?`<span class="rk rk1">1</span>`:(h.rank!=null?`<span class="rk rk-o">${h.rank}</span>`:'');
  const sc=h.score||0, barW=Math.max(2,Math.min(64,sc*0.62));
  const barCol=isOut?gradeColor(Math.max(1,Math.min(10,Math.ceil(sc/8)))):'#2a3a33';
  const odds=h.odds!=null?'約'+h.odds.toFixed(1):'―', pop=h.pop!=null?h.pop+'人':'―';
  return `<tr class="${isOut?'out':''} ${isSho?'sho':''} ${marked?'marked':''} ${isKeshi?'keshi':''}">
    <td class="mk">${markSelect(ri,h.num)}</td>
    <td><span class="waku" style="${wakuStyle(h.g)}">${h.g||''}</span></td>
    <td class="nm"><span class="uno">${String(h.num).padStart(2,'0')}</span>${h.name||''}${isSho?'<span class="sho-dot">◆</span>':''}</td>
    <td>${pop}</td><td>${odds}</td><td>${rkCell}</td>
    <td><span class="scorebar" style="width:${barW}px;background:${barCol}"></span><span class="led">${sc.toFixed(0)}</span></td>
  </tr>`;
}

function digestList(r,ri){
  const top=r.rows.slice().sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,3);
  return `<div class="digest-list">`+top.map((h,i)=>{
    const isSho=r.shobu===h.num, ms=markStr(ri,h.num), isKeshi=(ms===KESHI);
    return `<div class="dh ${isKeshi?'keshi':''}">
      <span class="dmk ${isKeshi?'keshi':''}">${ms||''}</span>
      <span class="drk">CIF${i+1}</span>
      <span class="waku" style="${wakuStyle(h.g)}">${h.g||''}</span>
      <span class="dnm">${String(h.num).padStart(2,'0')} ${h.name}${isSho?'<span class="sho-dot">◆</span>':''}</span>
      <span class="dpop">${h.pop!=null?'想定'+h.pop+'人':''}</span>
      <span class="led">${(h.score||0).toFixed(0)}</span>
    </div>`;
  }).join('')+`</div>`;
}

function raceCard(r,ri){
  const col=gradeColor(r.stage);
  const segs=Array.from({length:10},(_,i)=>`<div class="s" style="background:${i<r.stage?gradeColor(i+1):'#16221d'}"></div>`).join('');
  const arashi=r.stage>=9?'arashi':'';
  const head=`<div class="rhead">
      <div class="rwho"><div class="v">${r.venue}<span class="r">${r.no}R</span></div>
      <div class="meta">${r.post||''}　${obandLabel(r.oband)}</div></div>
      <div class="stage ${VIEW==='digest'?'sm':''}" style="background:${col}"><div class="num">${r.stage}</div><div class="cap">波乱度</div></div>
    </div>`;
  if(VIEW==='digest'){
    return `<div class="race ${arashi}" id="${r._id}">${head}<div class="gauge">${segs}</div>
      <div class="label-row"><span>段 ${r.stage}/10 ・ ${GLABEL[r.stage]}</span>
      <span class="cifout">${r.shobu?'<span style="color:var(--shobu);font-weight:700">菖蒲湯あり</span>':''}</span></div>
      ${digestList(r,ri)}</div>`;
  }
  let shobuRow='';
  if(r.shobu){const h=r.rows.find(x=>x.num===r.shobu);
    shobuRow=`<div class="shobu-row"><span class="tag">菖蒲湯</span>
      <span class="who">${String(h.num).padStart(2,'0')} ${h.name}
      <small>想定${h.pop}番人気・約${h.odds.toFixed(1)}倍・CIF ${h.score.toFixed(0)}</small></span></div>`;}
  const key=raceSort[r._key]||SORT;
  const rows=sortRows(r.rows.map(h=>({...h,_ri:ri})),key);
  const sortBtn=(k,lbl)=>`<button class="${key===k?'on':''}" onclick="setRaceSort('${r._key}','${k}')">${lbl}</button>`;
  return `<div class="race ${arashi}" id="${r._id}">${head}
    <div class="gauge">${segs}</div>
    <div class="label-row"><span>段 ${r.stage}/10 ・ ${GLABEL[r.stage]}</span>
      <span class="cifout">想定人気薄CIF1位 = #${r.cif1!=null?String(r.cif1).padStart(2,'0'):'―'} (${r.cifout.toFixed(0)})</span></div>
    ${shobuRow}
    <div class="race-sort">${sortBtn('num','馬番')}${sortBtn('mark','印')}${sortBtn('pop','想定人気')}${sortBtn('cif','CIF')}</div>
    <table><thead><tr>
      <th>印</th><th class="l">枠</th><th class="l">馬</th><th>想定人気</th><th>想定単勝</th><th>CIF順</th><th>SCORE</th>
    </tr></thead><tbody>${rows.map(h=>horseRow(h,r,ri)).join('')}</tbody></table>
  </div>`;
}

function setRaceSort(key,sort){raceSort[key]=sort;saveStore('raceSort',raceSort);render();}

function buildNav(){
  // venue tabs
  document.getElementById('venueTabs').innerHTML=VENUES.map(v=>
    `<button data-venue="${v}" class="${v===VENUE?'on':''}">${v}</button>`).join('');
  // race jump for current venue
  const list=RACES.filter(r=>r.venue===VENUE).sort((a,b)=>a.no-b.no);
  const btns=list.map(r=>{
    const dot=r.stage>=9?'arashi-dot':'';
    return `<button class="${dot}" data-jump="${r._id}">${r.no}</button>`;
  }).join('');
  document.getElementById('raceJump').innerHTML=
    `<span class="jl">レース</span><button class="allbtn" data-jump="__top">全</button>`+btns;
}

function render(){
  const grid=document.getElementById('grid');
  grid.className='grid'+(VIEW==='digest'?' digest':'');
  // only current venue's races
  const idx=RACES.map((r,i)=>i).filter(i=>RACES[i].venue===VENUE)
                 .sort((a,b)=>RACES[a].no-RACES[b].no);
  grid.innerHTML=idx.map(i=>raceCard(RACES[i],i)).join('');
  buildNav();
  [...document.querySelectorAll('#viewCtrl button')].forEach(b=>b.classList.toggle('on',b.dataset.view===VIEW));
  [...document.querySelectorAll('#sortCtrl button')].forEach(b=>b.classList.toggle('on',b.dataset.sort===SORT));
  const dim=VIEW==='digest';
  const sg=document.getElementById('sortGroupWrap');
  sg.style.opacity=dim?'.4':'1'; sg.style.pointerEvents=dim?'none':'auto';
}

document.getElementById('venueTabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  VENUE=b.dataset.venue; saveStore('venue',VENUE); render();
  window.scrollTo({top:0,behavior:'smooth'});
});
document.getElementById('raceJump').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  const t=b.dataset.jump;
  if(t==='__top'){window.scrollTo({top:0,behavior:'smooth'});return;}
  const el=document.getElementById(t);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
});
document.getElementById('viewCtrl').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; VIEW=b.dataset.view; saveStore('view',VIEW); render();
});
document.getElementById('sortCtrl').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; SORT=b.dataset.sort; saveStore('sort',SORT);
  for(const k in raceSort) delete raceSort[k]; saveStore('raceSort',raceSort); render();
});
document.getElementById('clearMarks').addEventListener('click',()=>{
  if(!confirm('この開催の印をすべて消去します。よろしいですか？'))return;
  for(const k in marks) delete marks[k]; saveStore('marks',marks); render();
});

render();
</script>
